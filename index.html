<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>四屏作品集模板编辑器</title>
    <link rel="stylesheet" href="styles.css" />
    <style>
      .panel-section:has(#styleTarget) {
        display: none !important;
      }
    </style>
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="brand-lockup">
          <img class="brand-logo" src="assets/rand-logo.png" alt="RAND Web-Design" />
        </div>

        <nav class="screen-tabs" aria-label="页面选择">
          <button class="tab is-active" data-screen="hero"><span class="tab-copy"><span class="tab-cn">首页</span><small>Home</small></span></button>
          <button class="tab" data-screen="about"><span class="tab-copy"><span class="tab-cn">关于我</span><small>About</small></span></button>
          <button class="tab" data-screen="works"><span class="tab-copy"><span class="tab-cn">作品</span><small>Works</small></span></button>
          <button class="tab" data-screen="contact"><span class="tab-copy"><span class="tab-cn">联系我</span><small>Contact</small></span></button>
        </nav>

        <div class="top-actions">
          <button class="icon-button" id="importBtn" title="导入 JSON">导入</button>
          <div class="export-menu">
            <button class="icon-button" id="exportBtn" title="导出">导出</button>
            <div class="export-dropdown" role="menu" aria-label="导出格式">
              <button type="button" data-export-format="html" role="menuitem">HTML</button>
              <button type="button" data-export-format="jpg" role="menuitem">长图 JPG</button>
            </div>
          </div>
          <button class="primary-button" id="publishBtn">发布预览</button>
          <input type="file" id="importFile" accept="application/json" hidden />
        </div>
      </header>

      <main class="workspace">
        <aside class="panel left-panel">
          <section class="panel-section library-panel" data-library="hero">
            <p class="eyebrow">展示模板库</p>
            <h2>动态首屏</h2>
            <div class="template-list" id="heroTemplateList"></div>
          </section>

          <section class="panel-section library-panel is-hidden" data-library="about">
            <p class="eyebrow">关于我 版式</p>
            <h2>个人介绍</h2>
            <div class="template-list" id="aboutLayoutList"></div>
          </section>

          <section class="panel-section library-panel is-hidden" data-library="works">
            <p class="eyebrow">作品 版式</p>
            <h2>作品目录</h2>
            <div class="template-list" id="worksLayoutList"></div>
          </section>

          <section class="panel-section library-panel is-hidden" data-library="contact">
            <p class="eyebrow">联系我</p>
            <h2>联系方式</h2>
            <div class="template-list" id="contactLayoutList"></div>
          </section>
        </aside>

        <section class="stage-wrap">
          <div class="stage-toolbar">
            <div class="mode-switch">
              <button class="mode-toggle" id="modeToggle" type="button" aria-pressed="false" aria-label="切换到预览模式">
                <span class="mode-toggle-label">
                  <span class="mode-toggle-cn">编辑</span>
                  <span class="mode-toggle-en">Edit</span>
                </span>
                <span class="mode-toggle-arrow" aria-hidden="true">
                  <img src="assets/short-arrow.svg" alt="" />
                </span>
              </button>
            </div>
            <div class="playback">
              <button class="round-button" id="playBtn" title="播放">▶</button>
              <button class="round-button" id="pauseBtn" title="暂停">Ⅱ</button>
              <button class="round-button" id="resetBtn" title="重置动画">↻</button>
            </div>
          </div>

          <div class="canvas-outer">
            <div class="canvas-frame ratio-16-9 device-desktop" id="canvasFrame">
              <div class="site-preview" id="sitePreview"></div>
            </div>
          </div>

          <div class="canvas-meta">
            <span id="screenLabel">首页 / Orbit Carousel</span>
            <span id="neededLabel">还需上传 10 张图片</span>
          </div>
        </section>

        <aside class="panel right-panel">
          <section class="panel-section">
            <div class="section-head">
              <div>
                <p class="eyebrow">配置面板</p>
                <h2 id="configTitle">首页设置</h2>
              </div>
            </div>
          </section>

          <section class="panel-section config-screen" data-config="hero">
            <div class="field-grid">
              <label>
                <span>画布比例</span>
                <select id="ratioSelect">
                  <option value="16-9">16:9</option>
                  <option value="4-3">4:3</option>
                  <option value="1-1">1:1</option>
                  <option value="4-5">4:5</option>
                  <option value="9-16">9:16</option>
                </select>
              </label>
              <label>
                <span>动画速度</span>
                <select id="speedSelect">
                  <option value="slow">慢</option>
                  <option value="medium">中</option>
                  <option value="fast">快</option>
                </select>
              </label>
              <label>
                <span>背景</span>
                <select id="backgroundSelect">
                  <option value="black">黑色</option>
                  <option value="ivory">奶白</option>
                </select>
              </label>
            </div>

            <div class="section-head compact">
              <h3>Media Slots</h3>
              <span id="slotCountLabel">0 / 10</span>
            </div>
            <div class="slots-list" id="slotsList"></div>
          </section>

          <section class="panel-section config-screen is-hidden" data-config="about">
            <div class="field-stack" id="aboutFields"></div>
          </section>

          <section class="panel-section config-screen is-hidden" data-config="works">
            <div class="field-grid">
              <label>
                <span>分类筛选</span>
                <select id="worksFilter"></select>
              </label>
              <button class="secondary-button" id="addWorkBtn">新增项目</button>
            </div>
            <div class="works-editor-list" id="worksEditorList"></div>
          </section>

          <section class="panel-section config-screen is-hidden" data-config="contact">
            <div class="field-stack" id="contactFields"></div>
          </section>

          <section class="panel-section">
            <div class="section-head compact">
              <h3>样式系统</h3>
              <select id="styleTarget">
                <option value="global">全局</option>
                <option value="hero">首页</option>
                <option value="about">关于我</option>
                <option value="works">作品</option>
                <option value="contact">联系我</option>
              </select>
            </div>
            <div class="style-grid" id="styleControls"></div>
          </section>
        </aside>
      </main>
    </div>

    <div class="modal is-hidden" id="qrModal" role="dialog" aria-modal="true">
      <button class="modal-close" id="closeQrModal">×</button>
      <img id="qrModalImage" alt="微信二维码放大预览" />
    </div>

    <div class="modal crop-modal is-hidden" id="cropModal" role="dialog" aria-modal="true">
      <div class="crop-dialog">
        <div class="crop-header">
          <div>
            <p class="eyebrow">图片裁切</p>
            <h3 id="cropTitle">适配当前占位图</h3>
          </div>
          <button class="modal-close crop-close" id="closeCropModal" type="button">×</button>
        </div>
        <div class="crop-stage" id="cropStage">
          <img id="cropImage" alt="裁切预览" draggable="false" />
          <div class="crop-frame" id="cropFrame" aria-hidden="true"></div>
        </div>
        <div class="crop-controls">
          <label>
            <span>缩放</span>
            <input id="cropZoom" type="range" min="1" max="3" step="0.01" value="1" />
          </label>
          <div class="crop-actions">
            <button class="secondary-button" id="cancelCropBtn" type="button">取消</button>
            <button class="primary-button" id="applyCropBtn" type="button">应用裁切</button>
          </div>
        </div>
      </div>
    </div>

    <div class="modal skill-modal is-hidden" id="skillModal" role="dialog" aria-modal="true">
      <div class="skill-dialog">
        <div class="skill-dialog-head">
          <div>
            <p class="eyebrow">Software Skills</p>
            <h3>编辑软件技能</h3>
          </div>
          <button class="modal-close" id="closeSkillModal" type="button">×</button>
        </div>
        <label class="skill-toggle">
          <input id="showSkillPercent" type="checkbox" checked />
          <span>显示百分比</span>
        </label>
        <div class="skill-editor-layout">
          <section>
            <h4>技能选择与排序</h4>
            <div class="skill-editor-list" id="skillPresetList"></div>
          </section>
          <section>
            <h4>添加自定义技能</h4>
            <form class="skill-custom-form" id="skillCustomForm">
              <button class="skill-icon-picker" type="button" onclick="document.getElementById('skillIconInput').click()">
                <span id="skillIconPreview">+</span>
              </button>
              <input id="skillIconInput" type="file" accept="image/*" hidden />
              <label><span>技能名称</span><input id="skillNameInput" type="text" placeholder="例如 Procreate" /></label>
              <label><span>简称</span><input id="skillShortInput" type="text" maxlength="6" placeholder="Pr" /></label>
              <label><span>熟练度 <b id="skillLevelOutput">70%</b></span><input id="skillLevelInput" type="range" min="0" max="100" value="70" /></label>
              <label><span>等级</span><select id="skillLevelTextInput"><option>基础</option><option selected>熟练</option><option>精通</option></select></label>
              <div class="skill-form-actions">
                <button class="secondary-button" id="resetSkillEditorBtn" type="button">清空</button>
                <button class="primary-button" type="submit">保存技能</button>
              </div>
            </form>
            <div class="skill-custom-list" id="skillCustomList"></div>
          </section>
        </div>
        <div class="skill-dialog-actions">
          <button class="primary-button" id="saveSkillModalBtn" type="button">完成</button>
        </div>
      </div>
    </div>

    <script type="text/plain" id="embeddedStyles">
:root {
  color-scheme: dark;
  --bg: #0b0c0c;
  --panel: rgba(21, 22, 21, 0.86);
  --panel-strong: #171817;
  --line: rgba(234, 229, 217, 0.12);
  --line-strong: rgba(234, 229, 217, 0.2);
  --text: #f0ede4;
  --muted: #9c9a92;
  --soft: #c6c0b4;
  --accent: #c8a46a;
  --accent-2: #7f9b84;
  --danger: #d56d5f;
  --shadow: 0 26px 80px rgba(0, 0, 0, 0.42);
  --radius: 8px;
  --font: Inter, "Helvetica Neue", Arial, "PingFang SC", "Microsoft YaHei", sans-serif;
}

* {
  box-sizing: border-box;
}

html,
body {
  height: 100%;
}

body {
  margin: 0;
  font-family: var(--font);
  background:
    linear-gradient(rgba(255, 255, 255, 0.028) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255, 255, 255, 0.028) 1px, transparent 1px),
    radial-gradient(circle at 50% -15%, rgba(200, 164, 106, 0.14), transparent 30%),
    var(--bg);
  background-size: 24px 24px, 24px 24px, 100% 100%, 100% 100%;
  color: var(--text);
  overflow: hidden;
}

button,
input,
select,
textarea {
  font: inherit;
}

button {
  border: 0;
  cursor: pointer;
}

input,
select,
textarea {
  width: 100%;
  border: 1px solid var(--line);
  background: rgba(255, 255, 255, 0.045);
  color: var(--text);
  border-radius: 6px;
  padding: 9px 10px;
  outline: none;
}

select option {
  background: #151615;
  color: var(--text);
}

textarea {
  min-height: 76px;
  resize: vertical;
}

label span,
.field-label {
  display: block;
  color: var(--muted);
  font-size: 12px;
  margin-bottom: 6px;
}

.app-shell {
  display: grid;
  grid-template-rows: 68px minmax(0, 1fr);
  height: 100vh;
}

.topbar {
  position: relative;
  z-index: 60;
  display: grid;
  grid-template-columns: 280px 1fr auto;
  align-items: center;
  gap: 22px;
  padding: 12px 18px;
  border-bottom: 1px solid var(--line);
  backdrop-filter: blur(20px);
  background: rgba(11, 12, 12, 0.78);
}

.brand-lockup {
  display: flex;
  align-items: center;
  gap: 14px;
  min-width: 0;
}

.brand-lockup strong,
.brand-lockup span {
  display: block;
}

.brand-lockup span {
  margin-top: 2px;
  color: var(--muted);
  font-size: 12px;
}

.brand-logo {
  width: 190px;
  height: 43px;
  object-fit: contain;
  object-position: left center;
  flex: 0 0 auto;
  filter: invert(1);
}

.screen-tabs,
.top-actions,
.stage-toolbar,
.mode-switch,
.playback {
  display: flex;
  align-items: center;
  gap: 8px;
}

.screen-tabs {
  justify-content: center;
}

.top-actions {
  justify-content: flex-end;
  flex-wrap: nowrap;
}

.tab,
.pill,
.icon-button,
.secondary-button,
.primary-button,
.round-button {
  color: var(--soft);
  background: rgba(255, 255, 255, 0.055);
  border: 1px solid var(--line);
  border-radius: 999px;
  min-height: 34px;
  padding: 8px 12px;
  transition: border-color 0.18s ease, background 0.18s ease, color 0.18s ease, transform 0.18s ease;
}

.tab:hover,
.pill:hover,
.icon-button:hover,
.secondary-button:hover,
.round-button:hover {
  border-color: var(--line-strong);
  transform: translateY(-1px);
}

.tab.is-active,
.pill.is-active {
  color: #11120f;
  background: var(--accent);
  border-color: var(--accent);
}

.primary-button {
  color: #11120f;
  background: #e2c68d;
  border-color: #e2c68d;
  font-weight: 700;
}

.secondary-button {
  border-radius: 6px;
  color: var(--text);
}

.round-button {
  width: 34px;
  height: 34px;
  padding: 0;
}

.export-menu {
  position: relative;
  display: inline-flex;
  z-index: 40;
}

.export-dropdown {
  position: absolute;
  top: calc(100% + 8px);
  right: 0;
  display: grid;
  min-width: 132px;
  padding: 6px;
  border: 1px solid var(--line);
  border-radius: 14px;
  background: rgba(18, 18, 17, 0.96);
  box-shadow: 0 18px 42px rgba(0, 0, 0, 0.42);
  opacity: 0;
  pointer-events: none;
  transform: translateY(-6px);
  transition: opacity 0.16s ease, transform 0.16s ease;
}

.export-dropdown::before {
  content: "";
  position: absolute;
  inset: -10px 0 auto 0;
  height: 10px;
}

.export-menu:hover .export-dropdown,
.export-menu:focus-within .export-dropdown {
  opacity: 1;
  pointer-events: auto;
  transform: translateY(0);
}

.export-dropdown button {
  width: 100%;
  border: 0;
  border-radius: 10px;
  padding: 10px 12px;
  color: var(--soft);
  background: transparent;
  font: inherit;
  text-align: left;
  white-space: nowrap;
  cursor: pointer;
}

.export-dropdown button:hover,
.export-dropdown button:focus-visible {
  color: #11120f;
  outline: 0;
  background: var(--accent);
}

.workspace {
  display: grid;
  grid-template-columns: 300px minmax(340px, 1fr) 360px;
  min-height: 0;
}

.workspace[data-active-screen="about"],
.workspace[data-active-screen="works"],
.workspace[data-active-screen="contact"] {
  grid-template-columns: 300px minmax(340px, 1fr);
}

.workspace[data-active-screen="about"] .right-panel,
.workspace[data-active-screen="works"] .right-panel,
.workspace[data-active-screen="contact"] .right-panel {
  display: none;
}

.panel {
  min-height: 0;
  overflow: auto;
  border-right: 1px solid var(--line);
  background: linear-gradient(180deg, rgba(23, 24, 23, 0.92), rgba(14, 15, 15, 0.88));
}

.right-panel {
  border-right: 0;
  border-left: 1px solid var(--line);
}

.panel-section {
  padding: 18px;
  border-bottom: 1px solid var(--line);
}

.panel-section h2,
.panel-section h3 {
  margin: 0;
}

.panel-section h2 {
  font-size: 19px;
  letter-spacing: 0;
}

.panel-section h3 {
  font-size: 14px;
}

.eyebrow {
  margin: 0 0 7px;
  color: var(--accent);
  text-transform: uppercase;
  font-size: 11px;
  letter-spacing: 0.08em;
}

.template-list {
  display: grid;
  gap: 10px;
  margin-top: 16px;
}

.template-card {
  display: grid;
  grid-template-columns: 74px 1fr;
  gap: 12px;
  align-items: center;
  width: 100%;
  padding: 10px;
  text-align: left;
  border-radius: 8px;
  border: 1px solid var(--line);
  background: rgba(255, 255, 255, 0.04);
  color: var(--text);
}

.template-card.is-active {
  border-color: rgba(200, 164, 106, 0.72);
  background: rgba(200, 164, 106, 0.1);
}

.template-card strong,
.template-card span {
  display: block;
}

.template-card span {
  margin-top: 5px;
  color: var(--muted);
  font-size: 12px;
  line-height: 1.45;
}

.template-thumb {
  height: 52px;
  border-radius: 6px;
  border: 1px solid var(--line);
  background:
    linear-gradient(135deg, rgba(255, 255, 255, 0.12), rgba(255, 255, 255, 0.02)),
    repeating-linear-gradient(90deg, transparent 0 13px, rgba(255, 255, 255, 0.08) 13px 14px);
  position: relative;
  overflow: hidden;
}

.template-thumb::before,
.template-thumb::after {
  content: "";
  position: absolute;
  background: rgba(200, 164, 106, 0.5);
  border: 1px solid rgba(255, 255, 255, 0.14);
}

.thumb-orbit::before {
  width: 26px;
  height: 18px;
  left: 23px;
  top: 15px;
  transform: rotate(-10deg);
}

.thumb-orbit::after {
  width: 42px;
  height: 27px;
  left: 14px;
  top: 12px;
  border-radius: 50%;
  background: transparent;
}

.thumb-film::before {
  width: 90px;
  height: 18px;
  left: -8px;
  top: 16px;
}

.thumb-film::after {
  width: 7px;
  height: 7px;
  left: 10px;
  top: 22px;
  box-shadow: 16px 0 rgba(12, 12, 12, 0.75), 32px 0 rgba(12, 12, 12, 0.75), 48px 0 rgba(12, 12, 12, 0.75);
}

.thumb-totem::before {
  width: 34px;
  height: 38px;
  left: 20px;
  top: 7px;
}

.thumb-totem::after {
  width: 34px;
  height: 38px;
  left: 26px;
  top: 10px;
  background: rgba(127, 155, 132, 0.55);
}

.thumb-mosaic::before {
  width: 26px;
  height: 18px;
  left: 9px;
  top: 9px;
  box-shadow: 30px 0 rgba(127, 155, 132, 0.55), 10px 24px rgba(200, 164, 106, 0.45), 40px 20px rgba(255, 255, 255, 0.14);
}

.thumb-photo-orbit::before {
  width: 34px;
  height: 24px;
  left: 16px;
  top: 7px;
  border-radius: 5px;
  transform: rotate(-7deg);
  box-shadow:
    20px 9px rgba(127, 155, 132, 0.56),
    -8px 23px rgba(238, 232, 220, 0.42),
    31px 27px rgba(200, 164, 106, 0.4);
}

.thumb-photo-orbit::after {
  width: 34px;
  height: 22px;
  left: 29px;
  top: 21px;
  border-radius: 5px;
  background: rgba(238, 232, 220, 0.55);
  transform: rotate(3deg);
}

.thumb-scroll-morph::before {
  width: 9px;
  height: 13px;
  left: 12px;
  top: 26px;
  border-radius: 3px;
  background: rgba(238, 232, 220, 0.68);
  box-shadow:
    12px -12px rgba(200, 164, 106, 0.62),
    29px -14px rgba(127, 155, 132, 0.56),
    42px -2px rgba(238, 232, 220, 0.5),
    31px 13px rgba(200, 164, 106, 0.46),
    13px 14px rgba(127, 155, 132, 0.42);
}

.thumb-scroll-morph::after {
  width: 52px;
  height: 1px;
  left: 11px;
  bottom: 10px;
  background: rgba(238, 232, 220, 0.35);
}

.thumb-image-trail::before {
  width: 26px;
  height: 34px;
  left: 12px;
  top: 10px;
  border-radius: 5px;
  background: rgba(238, 232, 220, 0.62);
  transform: rotate(-12deg);
  box-shadow:
    15px 7px rgba(200, 164, 106, 0.52),
    31px 14px rgba(127, 155, 132, 0.5),
    43px 23px rgba(238, 232, 220, 0.34);
}

.thumb-image-trail::after {
  width: 42px;
  height: 1px;
  left: 17px;
  top: 44px;
  background: linear-gradient(90deg, transparent, rgba(238, 232, 220, 0.58), transparent);
  transform: rotate(-12deg);
}

.thumb-three-d-carousel::before {
  width: 24px;
  height: 24px;
  left: 25px;
  top: 16px;
  border-radius: 6px;
  background: rgba(238, 232, 220, 0.64);
  box-shadow:
    -18px 4px rgba(127, 155, 132, 0.34),
    18px 4px rgba(200, 164, 106, 0.36),
    -30px 11px rgba(238, 232, 220, 0.18),
    30px 11px rgba(127, 155, 132, 0.18);
}

.thumb-three-d-carousel::after {
  width: 56px;
  height: 16px;
  left: 8px;
  top: 30px;
  border: 1px solid rgba(238, 232, 220, 0.24);
  border-top: 0;
  border-radius: 0 0 50% 50%;
  background: transparent;
}

.thumb-masonry-gallery::before {
  width: 14px;
  height: 34px;
  left: 12px;
  top: 9px;
  border-radius: 3px;
  background: rgba(238, 232, 220, 0.58);
  box-shadow:
    18px 0 rgba(127, 155, 132, 0.5),
    36px 0 rgba(200, 164, 106, 0.46),
    0 38px rgba(200, 164, 106, 0.38),
    18px 28px rgba(238, 232, 220, 0.42),
    36px 35px rgba(127, 155, 132, 0.32);
}

.thumb-masonry-gallery::after {
  width: 14px;
  height: 22px;
  left: 30px;
  top: 43px;
  border-radius: 3px;

  50% {

    opacity: 1;

  62.5% {

.photo-orbit {
  position: relative;
  width: 100%;
  height: 100%;
  display: grid;
  place-items: center;
  overflow: visible;
  transform-style: preserve-3d;
  user-select: none;
  border-radius: var(--media-radius, 8px);
  cursor: grab;

  outline: 2px solid rgba(240, 237, 228, 0.8);
  outline-offset: 4px;
}

.photo-orbit-ring {

.photo-orbit-stage {
  position: absolute;
  inset: 0;
  transform-style: preserve-3d;
  transform: rotateX(var(--orbit-tilt-x, 0deg)) rotateY(var(--orbit-tilt-y, 0deg));
  transition: transform 260ms ease;
}

.photo-orbit-card {
  position: absolute;
  left: 50%;
  top: 50%;
  width: clamp(104px, 22%, 182px);
  aspect-ratio: 1 / 1;
  opacity: var(--orbit-opacity, 1);
  filter: brightness(var(--orbit-brightness, 1)) saturate(0.96);
  transform:
    translate3d(calc(-50% + var(--orbit-x, 0px) + var(--orbit-shift-x, 0px)), calc(-50% + var(--orbit-y, 0px) + var(--orbit-shift-y, 0px)), 0)
    scale(var(--orbit-scale, 1));
  transform-origin: center center;
  animation: photoOrbitReveal 780ms cubic-bezier(0.16, 1, 0.3, 1) backwards;
  animation-delay: calc(var(--i) * 70ms);
  transition:
    filter 220ms ease;
  will-change: transform, opacity, filter;
}

.vertical-image-stack {
  position: relative;
  width: 100%;
  height: 100%;
  display: grid;
  place-items: center;
  overflow: hidden;
  user-select: none;
  touch-action: pan-x;
  cursor: default;
}

.vertical-image-stack.is-dragging {
  cursor: grabbing;
}

.vertical-image-stack:focus-visible {
  outline: 2px solid rgba(255, 255, 255, 0.72);
  outline-offset: 5px;
}

.vertical-stack-glow {
  position: absolute;
  inset: 50% auto auto 50%;
  width: min(600px, 72%);
  aspect-ratio: 1;
  border-radius: 50%;
  background: rgba(255, 255, 255, 0.035);
  filter: blur(52px);
  transform: translate(-50%, -50%);
  pointer-events: none;
}

.vertical-stack-stage {
  position: relative;
  z-index: 30;
  width: min(100%, 360px);
  height: 100%;
  display: grid;
  place-items: center;
  isolation: isolate;
}

.vertical-stack-card {
  position: absolute;
  height: min(88%, 430px);
  aspect-ratio: 2 / 3;
  z-index: var(--stack-z, 1);
  transform: translate3d(0, var(--stack-y, 0), 0) scale(var(--stack-scale, 1));
  opacity: var(--stack-opacity, 1);
  filter: brightness(0.72) saturate(0.9);
  transition:
    transform 720ms cubic-bezier(0.2, 0.85, 0.2, 1),
    opacity 520ms ease,
    filter 520ms ease;
  will-change: transform, opacity, filter;
  cursor: grab;
}

.vertical-stack-card:active {
  cursor: grabbing;
}

.vertical-stack-card.is-current {
  filter: brightness(1.04) saturate(1.02);
  pointer-events: auto;
}

.vertical-stack-card:not(.is-current) {
  pointer-events: none;
}

.vertical-stack-frame {
  position: relative;
  width: 100%;
  height: 100%;
  overflow: hidden;
  display: grid;
  place-items: center;
  backface-visibility: hidden;
  border-radius: clamp(22px, 3vw, 30px);
  border: 1px solid rgba(255, 255, 255, 0.14);
  background:
    linear-gradient(145deg, rgba(255, 255, 255, 0.16), transparent 34%),
    linear-gradient(135deg, #3b3d3c, #171817 62%, #5a5a55);
  box-shadow: 0 18px 42px -18px rgba(0, 0, 0, 0.72);
}

.vertical-stack-card.is-current.has-media .vertical-stack-frame {
  background: #fff;
}

.vertical-stack-card.is-current .vertical-stack-frame {
  box-shadow:
    0 28px 64px -18px rgba(0, 0, 0, 0.82),
    0 0 0 1px rgba(255, 255, 255, 0.08);
}

.vertical-stack-card:not(.is-current) .vertical-stack-frame {
  background:
    linear-gradient(145deg, rgba(255, 255, 255, 0.22), transparent 34%),
    linear-gradient(135deg, #555856, #202322 64%, #686a63);
}

.vertical-stack-frame img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.vertical-stack-shine,
.vertical-stack-fade {
  position: absolute;
  inset: 0;
  pointer-events: none;
  z-index: 2;
}

.vertical-stack-shine {
  background: linear-gradient(180deg, rgba(255, 255, 255, 0.12), transparent 36%);
}

.vertical-stack-fade {
  top: auto;
  height: 32%;
  background: linear-gradient(0deg, rgba(7, 8, 8, 0.28), transparent);
}

.vertical-stack-card.is-current .vertical-stack-shine {
  opacity: 0;
}

.vertical-stack-card.is-current .vertical-stack-fade {
  opacity: 0;
}

.vertical-stack-dots {
  position: absolute;
  right: clamp(18px, 4vw, 64px);
  top: 50%;
  z-index: 20;
  display: grid;
  gap: 6px;
  transform: translateY(-50%);
}

.vertical-stack-dot {
  width: 8px;
  height: 8px;
  padding: 0;
  border: 0;
  border-radius: 999px;
  background: rgba(240, 237, 228, 0.32);
  cursor: pointer;
  transition: height 240ms ease, background 240ms ease, opacity 240ms ease;
}

.vertical-stack-dot:hover {
  background: rgba(240, 237, 228, 0.58);
}

.vertical-stack-dot.is-active {
  height: 24px;
  background: var(--section-text, #f0ede4);
}

.vertical-stack-counter {
  position: absolute;
  left: clamp(18px, 4vw, 64px);
  top: 50%;
  z-index: 20;
  display: grid;
  justify-items: center;
  gap: 8px;
  transform: translateY(-50%);
  color: var(--section-text, #f0ede4);
  font-variant-numeric: tabular-nums;
}

.vertical-stack-current {
  font-size: clamp(28px, 4vw, 42px);
  font-weight: 300;
  line-height: 1;
}

.vertical-stack-rule {
  width: 32px;
  height: 1px;
  background: rgba(240, 237, 228, 0.22);
}

.vertical-stack-counter span:last-child {
  color: rgba(240, 237, 228, 0.56);
  font-size: 13px;
}

.vertical-stack-hint {
  position: absolute;
  left: 50%;
  bottom: clamp(16px, 4vw, 44px);
  z-index: 8;
  display: grid;
  justify-items: center;
  gap: 7px;
  transform: translateX(-50%);
  color: rgba(240, 237, 228, 0.58);
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
}

.stack-arrow {
  width: 15px;
  height: 15px;
  border-left: 1.5px solid currentColor;
  border-top: 1.5px solid currentColor;
}

.stack-arrow-up {
  transform: rotate(45deg);
  animation: stackArrowUp 1.5s ease-in-out infinite;
}

.stack-arrow-down {
  transform: rotate(225deg);
  animation: stackArrowDown 1.5s ease-in-out infinite;
}

@keyframes stackArrowUp {
  50% {
    translate: 0 -8px;
  }
}

@keyframes stackArrowDown {
  50% {
    translate: 0 8px;
  }
}

.zoom-parallax {
  position: relative;
  width: 100%;
  height: 100%;
  overflow: hidden;
  cursor: default;
  user-select: none;
  touch-action: none;
  border-radius: var(--media-radius, 8px);
  background:
    radial-gradient(circle at 50% 50%, rgba(255, 255, 255, 0.055), transparent 52%),
    rgba(5, 6, 6, 0.2);
}

.zoom-parallax:focus-visible {
  outline: 2px solid rgba(255, 255, 255, 0.72);
  outline-offset: 4px;
}

.zoom-parallax-spotlight {
  position: absolute;
  inset: 50% auto auto 50%;
  width: min(72vw, 720px);
  aspect-ratio: 1;
  border-radius: 50%;
  background: rgba(255, 255, 255, 0.06);
  filter: blur(44px);
  transform: translate(-50%, -50%);
  pointer-events: none;
}

.zoom-parallax-stage {
  position: absolute;
  inset: clamp(18px, 4vw, 48px);
  overflow: hidden;
  isolation: isolate;
}

.zoom-parallax-layer {
  position: absolute;
  left: var(--x);
  top: var(--y);
  width: var(--w);
  height: var(--h);
  z-index: 1;
  display: block;
  opacity: var(--layer-opacity, 1);
  filter: brightness(var(--layer-brightness, 1));
  transform: translate3d(var(--focus-x, 0px), var(--focus-y, 0px), 0) rotate(var(--rotate, 0deg));
  transform-origin: center center;
  transition:
    transform 720ms cubic-bezier(0.16, 1, 0.3, 1),
    opacity 540ms ease,
    filter 540ms ease;
  will-change: transform, opacity, filter;
}

.zoom-parallax-frame {
  position: relative;
  width: 100%;
  height: 100%;
  transform: scale(var(--card-scale, 1));
  transform-origin: center center;
  transition:
    transform 720ms cubic-bezier(0.16, 1, 0.3, 1),
    box-shadow 260ms ease,
    border-color 260ms ease;
  will-change: transform;
  cursor: zoom-in;
  display: grid;
  place-items: center;
  overflow: hidden;
  border-radius: var(--media-radius, 8px);
  border: var(--media-border, 1px solid rgba(255, 255, 255, 0.16));
  background:
    linear-gradient(145deg, rgba(255, 255, 255, 0.13), transparent 36%),
    linear-gradient(135deg, #3b3d3c, #171817 60%, #595955);
  box-shadow: var(--media-shadow, 0 20px 60px rgba(0, 0, 0, 0.38));
  backface-visibility: hidden;
}

.zoom-parallax-frame:focus-visible {
  border-color: rgba(240, 237, 228, 0.58);
  box-shadow:
    0 26px 80px rgba(0, 0, 0, 0.58),
    0 0 0 1px rgba(255, 255, 255, 0.18);
}

.zoom-parallax-layer[data-zoom="1.00"] .zoom-parallax-frame {
  cursor: zoom-in;
}

.zoom-parallax-layer:not([data-zoom="1.00"]) .zoom-parallax-frame {
  cursor: zoom-out;
}

.zoom-parallax-frame img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.mosaic-zoom-controls {
  position: absolute;
  top: 8px;
  right: 8px;
  z-index: 4;

  gap: 4px;

  transform-origin: top right;
  transition: opacity 160ms ease, transform 160ms ease;
  pointer-events: none;
}

.zoom-parallax-layer.is-active .mosaic-zoom-controls,

}

.zoom-parallax-layer:nth-child(1) {
  z-index: 8;
}

.zoom-parallax-layer:nth-child(2) {
  z-index: 7;
}

.zoom-parallax-layer:nth-child(3) {
  z-index: 6;
}

.zoom-parallax-layer:nth-child(4) {
  z-index: 5;
}

.zoom-parallax-layer:nth-child(5) {
  z-index: 4;
}

.zoom-parallax-layer:nth-child(6) {
  z-index: 3;
}

.zoom-parallax-layer:nth-child(7) {
  z-index: 2;
}

.zoom-parallax-progress {
  position: absolute;
  left: 50%;
  bottom: clamp(12px, 3vw, 28px);
  z-index: 20;
  width: min(240px, 42%);
  height: 2px;

  0% {

  100% {

  0% {

    transform: translateY(var(--blur-y, -42px));

  58% {

    filter: blur(5px);

.modal {

}

.modal img {

  object-fit: contain;
  background: #fff;
}

.modal-close {
  position: absolute;
  top: 22px;
  right: 22px;

  height: 38px;

.crop-modal {
  z-index: 42;
}

.crop-dialog {
  width: min(92vw, 860px);
  display: grid;
  gap: 16px;
  padding: 18px;
  border: 1px solid rgba(234, 229, 217, 0.16);
  border-radius: 10px;
  background: rgba(15, 16, 16, 0.96);
  box-shadow: 0 32px 120px rgba(0, 0, 0, 0.62);
}

.crop-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
}

.crop-header h3 {
  margin: 4px 0 0;
  font-size: 18px;
}

.crop-close {
  position: static;
  flex: 0 0 auto;
}

.crop-stage {
  position: relative;
  height: min(58vh, 520px);
  min-height: 320px;
  overflow: hidden;
  border: 1px solid rgba(234, 229, 217, 0.14);
  border-radius: 8px;
  background:
    linear-gradient(rgba(255, 255, 255, 0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255, 255, 255, 0.04) 1px, transparent 1px),
    #080909;
  background-size: 24px 24px;
  cursor: grab;
  touch-action: none;
}

.crop-stage:active {
  cursor: grabbing;
}

.crop-stage img {
  position: absolute;
  left: 50%;
  top: 50%;
  max-width: none;
  max-height: none;
  object-fit: contain;
  user-select: none;
  pointer-events: none;
  background: transparent;
}

.crop-frame {
  position: absolute;
  left: 50%;
  top: 50%;
  z-index: 2;
  transform: translate(-50%, -50%);
  border: 1px solid rgba(240, 237, 228, 0.94);
  border-radius: 8px;
  box-shadow:
    0 0 0 999px rgba(0, 0, 0, 0.52),
    0 18px 52px rgba(0, 0, 0, 0.4);
  pointer-events: none;
}

.crop-frame::before,
.crop-frame::after {
  content: "";
  position: absolute;
  inset: 33.333% 0 auto;
  height: 1px;
  background: rgba(240, 237, 228, 0.38);
}

.crop-frame::after {
  inset: 0 33.333% 0 auto;
  width: 1px;
  height: auto;
}

.crop-controls {
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 16px;
  align-items: end;
}

.crop-controls label {
  display: grid;
  gap: 8px;
  color: var(--muted);
}

.crop-controls input[type="range"] {
  width: 100%;
}

.crop-actions {
  display: flex;
  gap: 8px;
}

    grid-template-columns: repeat(2, minmax(64px, 1fr));
  }

  .about-cv-photo .portrait {
    width: min(240px, 72%);
    min-height: 250px;
    justify-self: start;
  }

  .about-cv-info dl div {
    grid-template-columns: 1fr;
    gap: 2px;
  }

  .about-profile-rail {
    min-height: auto;
    grid-template-rows: auto;
  }

  .about-polaroid {
    width: min(180px, 64%);
    justify-self: start;
  }

  .about-split-header {
    grid-template-columns: 1fr;
  }

  .about-split-header span:last-child {
    text-align: left;
  }

  .about-split-info {
    grid-template-columns: 1fr;
  }

  .about-resume-fields {
    grid-template-columns: 1fr;
  }

  .about-resume-side .portrait {
    width: min(190px, 72%);
  }

  .about-timeline-photo {
    width: min(240px, 78%);
    min-width: 0;
  }

  .preview-section {
    padding: 22px;
  }

  .media-zone {
    width: 100%;
    height: min(360px, 70%);
  }

  .media-zone-totem {
    height: min(560px, 78vh);
    min-height: 260px;
  }

  .vertical-stack-counter,
  .vertical-stack-dots {
    transform: translateY(-50%) scale(0.84);
  }

  .vertical-stack-counter {
    left: 8px;
  }

  .vertical-stack-dots {
    right: 8px;
  }

  .vertical-stack-hint {
    bottom: 8px;
  }

  .layout-grid,
  .layout-masonry,
  .layout-magazine {
    grid-template-columns: 1fr;
  }
}
